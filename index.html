<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DualPost Synergy — Upload to YouTube Shorts & TikTok Simultaneously</title>

  <!-- Open Graph / Discord embed -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://dualpost.app" />
  <meta property="og:title"       content="DualPost Synergy" />
  <meta property="og:description" content="Upload vertical videos to YouTube Shorts and TikTok simultaneously. Free, no account needed." />
  <meta property="og:image"       content="https://dualpost.app/icon-512.png" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="DualPost Synergy" />
  <meta name="twitter:description" content="Upload vertical videos to YouTube Shorts and TikTok simultaneously. Free, no account needed." />
  <meta name="twitter:image"      content="https://dualpost.app/icon-512.png" />
  <script>
    const search = window.location.search;
    const hasCode = search.includes('code=');

    if (hasCode) {
      // OAuth callback — send to app with full query string preserved
      window.location.replace('/app.html' + search);
    } else if (window.location.hostname !== 'kibbols.github.io') {
      // On dualpost.app with no code — show landing page
      window.location.replace('/landing.html');
    } else {
      // Direct GitHub visit with no code — send to app
      window.location.replace('/app.html');
    }
  </script>
</head>
<body></body>
</html>
